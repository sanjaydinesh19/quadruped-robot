name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Lint
        run: ruff check src/ tests/ mcp_server/
      - name: Type check
        run: mypy src/
      - name: Unit tests
        run: pytest tests/unit/ -v
